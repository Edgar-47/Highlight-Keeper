<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persistent Highlighter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="popup-shell">
    <main class="popup">
      <section class="hero">
        <p class="eyebrow">Resaltador Persistente</p>
        <h1>Guarda lo importante y recupéralo al volver.</h1>
        <p id="page-url" class="page-url">Cargando página...</p>
      </section>

      <section class="panel">
        <div class="panel-row">
          <h2>Color del resaltado</h2>
          <span class="count-pill count-pill--soft">8</span>
        </div>
        <div id="color-options" class="color-list"></div>

        <div class="actions">
          <button id="highlight-selection" class="primary-button" type="button">Resaltar selección</button>
          <button id="restore-page" class="secondary-button" type="button">Reaplicar</button>
          <button id="clear-page" class="secondary-button secondary-button--danger" type="button">Limpiar página</button>
        </div>
        <p class="helper-text">Consejo: también puedes seleccionar texto y usar clic derecho.</p>
        <p id="status" class="status">Listo.</p>
      </section>

      <section class="panel">
        <div class="panel-row">
          <h2>Resaltados guardados</h2>
          <span id="highlight-count" class="count-pill">0</span>
        </div>
        <div id="highlight-list" class="highlight-list">
          <p class="empty-state">Cargando...</p>
        </div>
      </section>
    </main>

    <script src="./types.js"></script>
    <script src="./storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
