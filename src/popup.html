<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persistent Highlighter</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="popup-shell">
    <main class="popup">
      <section class="hero">
        <p class="eyebrow">Persistent Highlighter</p>
        <h1>Save highlights that come back when you do.</h1>
        <p id="page-url" class="page-url">Loading page…</p>
      </section>

      <section class="panel">
        <div class="panel-row">
          <h2>Color</h2>
          <div class="color-grid">
            <button class="color-option color-option--yellow" data-color="yellow" type="button" aria-label="Yellow"></button>
            <button class="color-option color-option--green" data-color="green" type="button" aria-label="Green"></button>
            <button class="color-option color-option--blue" data-color="blue" type="button" aria-label="Blue"></button>
            <button class="color-option color-option--pink" data-color="pink" type="button" aria-label="Pink"></button>
            <button class="color-option color-option--orange" data-color="orange" type="button" aria-label="Orange"></button>
          </div>
        </div>

        <div class="actions">
          <button id="highlight-selection" class="primary-button" type="button">Highlight selection</button>
          <button id="clear-page" class="secondary-button" type="button">Clear page</button>
        </div>
        <p id="status" class="status">Ready.</p>
      </section>

      <section class="panel">
        <div class="panel-row">
          <h2>Saved highlights</h2>
          <span id="highlight-count" class="count-pill">0</span>
        </div>
        <div id="highlight-list" class="highlight-list">
          <p class="empty-state">Loading…</p>
        </div>
      </section>
    </main>

    <script src="./types.js"></script>
    <script src="./storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
